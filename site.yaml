# LightMark 站点配置文件
# 详细配置说明请参考：docs/design/01-core-implementation.md

# ============================================
# 站点基本信息
# ============================================
title: LightMark
description: 一个简洁的静态博客生成器
author:
url:
language: zh-CN

# ============================================
# 主题配置
# ============================================
theme: double-folding
darkMode: true

# ============================================
# 构建配置
# ============================================
output: dist
perPage: 20

# ============================================
# Markdown 配置
# ============================================
markdown:
  # TOC 提取的标题级别 [h2, h3, h4]
  tocLevel: [2, 3, 4]
  # 自动截取摘要的字符数
  excerptLength: 200

# ============================================
# SEO 配置（可选）
# ============================================
seo:
  googleAnalytics:
  baiduAnalytics: