<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ rootPath }}{{ asset('css/base.css') }}">
  <link rel="stylesheet" href="{{ rootPath }}{{ asset('css/layout.css') }}">
  <link rel="stylesheet" href="{{ rootPath }}{{ asset('css/components.css') }}">
  <link rel="stylesheet" href="{{ rootPath }}{{ asset('css/code.css') }}">

  {% block styles %}{% endblock %}
</head>
<body>
  <!-- Site Header -->
  <header class="site-header">
    <div class="header-container">
      <a href="{{ rootPath }}{{ url('home') }}" class="site-title">{{ site.title }}</a>

      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav">
        {% for s in allSeries %}
          <a href="{{ rootPath }}{{ s.url }}" class="nav-link">{{ s.title }}</a>
        {% endfor %}
        <a href="{{ rootPath }}{{ url('tags') }}" class="nav-link">标签</a>
      </nav>

      <div class="header-actions">
        <button class="theme-toggle" aria-label="Toggle theme">
          <span class="light-icon">&#9728;</span>
          <span class="dark-icon">&#127769;</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" hidden></div>

  <!-- Page Content -->
  <main class="main-content {% block mainClass %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <!-- Site Footer -->
  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; {{ site.author }} &middot; Built with LightMark</p>
    </div>
  </footer>

  <!-- Back to Top -->
  <button class="back-to-top" aria-label="Back to top" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>

  <!-- Scripts -->
  <script src="{{ rootPath }}{{ asset('js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
